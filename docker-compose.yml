volumes:
  nats-data:
  mongo-data:
  agents-pgdata:
  agents-data:

networks:
  internal:

services:
  nats:
    image: nats
    restart: always
    command:
      - "--js"
      - "--sd=/data"
    networks:
      - internal
    # ports:
    #   - 4222:4222 # for debugging
    #   - 8222:8222 # for debugging
    volumes:
      - nats-data:/data

  mongodb: 
    image: mongo:8
    restart: always
    networks:
      - internal
    # ports:
    #   - 27017:27017 # for debugging
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 127.0.0.1:8081:8081
    depends_on:
      - mongodb
    networks:
      - internal
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false

  agents-db:
    image: agnohq/pgvector:18
    restart: always
    networks:
      - internal
    # ports:
    #   - 5432:5432 # for debugging
    volumes:
      - agents-pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}

  agents-api:
    image: seraph-agents
    build:
      context: ./agents
      dockerfile: Dockerfile
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - agents-db
      - nats
    networks:
      - internal
    ports:
      - 8000:8000
    volumes:
      - agents-data:/data
    environment:
      RUNTIME_ENV: prd
      DB_HOST: agents-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-gpt-5.2}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      NATS_URL: nats://nats:4222
      KB_INGEST_ENABLED: ${KB_INGEST_ENABLED:-true}
      KB_MAX_FILE_BYTES: ${KB_MAX_FILE_BYTES:-20971520}
      KB_PULL_BATCH: ${KB_PULL_BATCH:-20}
      KB_FETCH_TIMEOUT: ${KB_FETCH_TIMEOUT:-10.0}
      KB_ACK_WAIT_SECONDS: ${KB_ACK_WAIT_SECONDS:-30}
      KB_CONSUMER_NAME: ${KB_CONSUMER_NAME:-seraph-agents-kb}
      KB_INGEST_PARALLELISM: ${KB_INGEST_PARALLELISM:-4}
      KB_IDLE_BACKOFF_BASE: ${KB_IDLE_BACKOFF_BASE:-0.5}
      KB_IDLE_BACKOFF_MAX: ${KB_IDLE_BACKOFF_MAX:-5.0}
      SERAPH_AUTH_USER_HEADER: ${SERAPH_AUTH_USER_HEADER:-X-Seraph-User}
  
  api-gateway:
    image: seraph
    restart: always
    command: 
      - api-gateway
    depends_on:
      - nats
      - mongodb
    networks:
      - internal
    ports:
      - 8080:8080
    environment:
      GIN_MODE: release
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_MONGO_URL: mongodb://mongodb:27017/
      # SERAPH_AUTH_ENABLED: false
      SERAPH_AUTH_CONFIGURL: https://localhost:8081/realms/seraph
      SERAPH_AUTH_REDIRECTURL: http://localhost:8080/auth/callback
      SERAPH_AUTH_CLIENTID: seraph

  file-indexer:
    image: seraph
    restart: always
    command: 
      - file-indexer
    depends_on:
      - nats
      - mongodb
    networks:
      - internal
    environment:
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_MONGO_URL: mongodb://mongodb:27017/

  thumbnailer:
    image: seraph
    restart: always
    command: 
      - thumbnailer
    depends_on:
      - nats
    networks:
      - internal
    environment:
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_THUMBNAILER_PROVIDERID: thumbs
    deploy:
      replicas: 6

  shares:
    image: seraph
    restart: always
    command: 
      - shares
    depends_on:
      - nats
      - mongodb
    networks:
      - internal
    environment:
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_MONGO_URL: mongodb://mongodb:27017/

  spaces:
    image: seraph
    restart: always
    command: 
      - spaces
    depends_on:
      - nats
      - mongodb
    networks:
      - internal
    environment:
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_MONGO_URL: mongodb://mongodb:27017/

  jobs:
    image: seraph
    restart: always
    command: 
      - jobs
    depends_on:
      - nats
    networks:
      - internal
    environment:
      SERAPH_NATS_URL: nats://nats:4222
    
  file-provider-dir:
    image: seraph
    restart: always
    command: 
      - file-provider-dir
    depends_on:
      - nats
    networks:
      - internal
    # volumes:
    #   - /some/local/dir:/data
    environment:
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_FILEPROVIDER_ID: dirtest
      SERAPH_FILEPROVIDER_DIR: /data
      SERAPH_FILEPROVIDER_READONLY: true

  file-provider-smb:
    image: seraph
    restart: always
    command: 
      - file-provider-smb
    depends_on:
      - nats
    networks:
      - internal
    environment:
      SERAPH_NATS_URL: nats://nats:4222
      SERAPH_FILEPROVIDER_ID: smbtest
      SERAPH_FILEPROVIDER_ADDR: host:445
      SERAPH_FILEPROVIDER_USERNAME:
      SERAPH_FILEPROVIDER_PASSWORD:
      SERAPH_FILEPROVIDER_SHARENAME: foo
      SERAPH_FILEPROVIDER_READONLY: true
